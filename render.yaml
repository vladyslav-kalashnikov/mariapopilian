services:
  - type: web
    name: mariapopilian
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    disk:
      name: maria-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 5
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: HOST
        value: 0.0.0.0
      - key: ADMIN_PASSWORD
        sync: false
